version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/' 
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 5
      semver-major-days: 21
      semver-minor-days: 14
      semver-patch-days: 7
    groups:
      npm-dependencies:
        patterns:
          - "*"
  - package-ecosystem: 'github-actions'
    directory: '/' 
    schedule:
      interval: 'weekly'
    groups:
      github-actions-dependencies:
        patterns:
          - "*"